<div class="flex flex-auto overflow-hidden">

    <!-- Master pane -->
    <div class="flex flex-col flex-auto sm:max-w-100 border-r overflow-hidden">

        <!-- Header -->
        <div class="flex flex-col flex-0 p-6 border-b">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-semibold">Empleados</div>
                <button mat-flat-button color="primary" (click)="createNew()">
                    <mat-icon svgIcon="heroicons_outline:plus"></mat-icon>
                    <span class="ml-2">Nuevo</span>
                </button>
            </div>

            <div class="text-sm text-secondary mt-1">
                Activos: {{ service.activeCount() }} / {{ service.employees().length }}
            </div>

            <mat-form-field class="w-full mt-4" subscriptSizing="dynamic">
                <mat-icon matPrefix svgIcon="heroicons_outline:magnifying-glass"></mat-icon>
                <input
                    matInput
                    placeholder="Buscar por nombre, email o documento"
                    [ngModel]="service.searchQuery()"
                    (ngModelChange)="onSearch($event)">
            </mat-form-field>

            <mat-button-toggle-group
                class="mt-3"
                [value]="service.statusFilter()"
                (change)="onStatusFilter($event.value)">
                <mat-button-toggle value="all">Todos</mat-button-toggle>
                <mat-button-toggle *ngFor="let s of statusOptions" [value]="s">
                    {{ statusLabels[s] }}
                </mat-button-toggle>
            </mat-button-toggle-group>
        </div>

        <!-- List -->
        <div class="flex-auto overflow-y-auto">

            <ng-container *ngIf="service.loading()">
                <div class="flex items-center justify-center p-8">
                    <mat-spinner diameter="32"></mat-spinner>
                </div>
            </ng-container>

            <ng-container *ngIf="service.error() as err">
                <div class="m-4 p-3 rounded bg-red-100 text-red-800 text-sm">
                    {{ err }}
                </div>
            </ng-container>

            <ng-container *ngIf="!service.loading() && service.filteredList().length === 0">
                <div class="p-8 text-center text-secondary">
                    No hay empleados.
                </div>
            </ng-container>

            <ul class="divide-y">
                <li
                    *ngFor="let emp of service.filteredList(); trackBy: trackById"
                    class="flex flex-col p-4 cursor-pointer hover:bg-hover"
                    [class.bg-primary-50]="service.selectedId() === emp.id"
                    (click)="openEmployee(emp)">
                    <div class="flex items-center justify-between">
                        <div class="font-medium truncate">{{ emp.full_name }}</div>
                        <span
                            class="text-xs px-2 py-0.5 rounded"
                            [class.bg-green-100]="emp.status === 'active'"
                            [class.text-green-800]="emp.status === 'active'"
                            [class.bg-gray-200]="emp.status === 'inactive'"
                            [class.text-gray-700]="emp.status === 'inactive'">
                            {{ statusLabels[emp.status] }}
                        </span>
                    </div>
                    <div class="text-sm text-secondary truncate">{{ emp.email }}</div>
                </li>
            </ul>
        </div>
    </div>

    <!-- Detail pane outlet -->
    <div class="hidden sm:flex flex-auto overflow-hidden">
        <router-outlet></router-outlet>
    </div>
</div>
